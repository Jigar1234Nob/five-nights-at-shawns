<html>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <meta name='mobile-web-app-capable' content='yes'>
    <meta name='apple-mobile-web-app-capable' content='yes'>
    <meta name='apple-mobile-web-app-status-bar-style' content='black-translucent'>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            position: fixed;
            top: 0; left: 0;
        }
        /* Make door buttons much easier to tap on mobile */
        #leftButtom, #rightButtom {
            min-width: 44px;
            min-height: 44px;
            cursor: pointer;
        }
        /* Make monitor button easier to tap */
        #monitor {
            cursor: pointer;
            min-height: 44px;
        }
        /* Make all cam buttons easier to tap */
        #showStage, #diningArea, #backstage, #pirateCove,
        #restrooms, #kitchen, #westHall, #supplyCloset,
        #westCorner, #eastHall, #eastCorner {
            min-width: 36px;
            min-height: 36px;
            cursor: pointer;
        }
        /* Timer tap zone for M easter egg on mobile */
        #timerTxt {
            cursor: pointer;
            padding: 8px;
        }
        /* Power tap zone for L easter egg on mobile */
        #powerTxt {
            cursor: pointer;
            padding: 8px;
        }
        /* Scale font on small screens */
        @media (max-width: 480px) {
            #timerTxt, #powerTxt, #usageTxt {
                font-size: 100% !important;
            }
        }
    </style>
</head>
<body style='touch-action: none; overflow: hidden;'>

<!-- Audio -->
<audio id="santiagoAudio" src="nightshift/santiago1.mp3"></audio>
<audio id="vicAudio" src="nightshift/vic1.mp3"></audio>

<!-- Intro Message -->
<div id="introMessage" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background-color: rgba(0, 0, 0, 0.8); color: white; padding: 15px 20px; font-family: 'Courier New', Courier, monospace; font-size: 18px; border: 2px solid #666; z-index: 9999;">
    <strong>Santiago:</strong> Ugh. Why Do I Have To Work Out Of All Days But Today!
</div>

<div id="introMessage2" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background-color: rgba(0, 0, 0, 0.8); color: white; padding: 15px 20px; font-family: 'Courier New', Courier, monospace; font-size: 18px; border: 2px solid #666; z-index: 9999; display: none;">
    <strong>Vic:</strong> I dont care. Just Work Until 6 AM Then You Can Go Home.
</div>

<script>
    // Play Santiago when page loads
    window.addEventListener('load', function() {
        document.getElementById('santiagoAudio').play().catch(() => {});
    });

    // Hide first message after 5 seconds and show second message
    setTimeout(function() {
        document.getElementById('introMessage').style.display = 'none';
        document.getElementById('introMessage2').style.display = 'block';

        // Play Vic audio
        document.getElementById('vicAudio').play().catch(() => {});
    }, 5000);
    
    // Hide second message after 10 seconds total
    setTimeout(function() {
        document.getElementById('introMessage2').style.display = 'none';
    }, 10000);
</script>

        <!-- script -->
        <script>
            // variables
            leftDoor == false;
            rightDoor == false;
            tablet = false;
            timerCounter = 12;
            powerCounter = 100;
            usageCounter = 2;
            bunny = -1;
            chicken = -1;
            bear = -1;
            bearOutage = 0;
            fox = -1;
            goldenRandom = 0;
            goldenScare = 0;

            // ── M KEY EASTER EGG ──────────────────────────────────────────
            var mPressCount = 0;
            var mEasterEggTriggered = false;

            document.addEventListener('keydown', function(e) {
                if (e.key === 'm' || e.key === 'M') {
                    if (mEasterEggTriggered) return; // already fired, ignore
                    mPressCount++;
                    if (mPressCount >= 10) {
                        mEasterEggTriggered = true;
                        triggerChicaEasterEgg();
                    }
                }
            });

            function triggerChicaEasterEgg() {
                // Hide everything
                document.getElementById('office').style.display = 'none';
                document.getElementById('goldenOffice').style.visibility = 'hidden';
                document.getElementById('camera').style.visibility = 'hidden';
                document.getElementById('static').style.visibility = 'hidden';
                document.getElementById('leftButtom').style.visibility = 'hidden';
                document.getElementById('leftDoor').style.visibility = 'hidden';
                document.getElementById('rightButtom').style.visibility = 'hidden';
                document.getElementById('rightDoor').style.visibility = 'hidden';
                document.getElementById('monitor').style.visibility = 'hidden';
                document.getElementById('map').style.visibility = 'hidden';
                document.getElementById('showStage').style.visibility = 'hidden';
                document.getElementById('diningArea').style.visibility = 'hidden';
                document.getElementById('backstage').style.visibility = 'hidden';
                document.getElementById('pirateCove').style.visibility = 'hidden';
                document.getElementById('restrooms').style.visibility = 'hidden';
                document.getElementById('kitchen').style.visibility = 'hidden';
                document.getElementById('westHall').style.visibility = 'hidden';
                document.getElementById('supplyCloset').style.visibility = 'hidden';
                document.getElementById('westCorner').style.visibility = 'hidden';
                document.getElementById('eastHall').style.visibility = 'hidden';
                document.getElementById('eastCorner').style.visibility = 'hidden';
                document.getElementById('timerTxt').style.visibility = 'hidden';
                document.getElementById('powerTxt').style.visibility = 'hidden';
                document.getElementById('usageTxt').style.visibility = 'hidden';

                // Stop all game audio
                document.getElementById('ambienceCamera').pause();
                document.getElementById('laugh1').volume = 0;
                document.getElementById('laugh2').volume = 0;
                document.getElementById('laugh3').volume = 0;
                document.getElementById('kitchen1').volume = 0;
                document.getElementById('kitchen2').volume = 0;
                document.getElementById('run').volume = 0;
                document.getElementById('walk1').volume = 0;
                document.getElementById('walk2').volume = 0;
                document.getElementById('walk3').volume = 0;
                document.getElementById('walk4').volume = 0;
                document.getElementById('walk5').volume = 0;

                // Show Chica jumpscare gif
                var scare = document.createElement('img');
                scare.src = 'nightshift/chica/jumpscare.gif';
                scare.style = 'position:absolute; top:0; left:0; width:100%; height:100%; z-index:9999;';
                scare.id = 'chicaEasterEggImg';
                document.body.appendChild(scare);

                // Play oui (Chica's death sound) + music box
                document.getElementById('oui').play();
                document.getElementById('musicBox').play();

                // After Chica gif plays out, go to game over
                setTimeout(function(){ window.location.href = 'game over.html'; }, 6200);
            }
            // ── END M KEY EASTER EGG ──────────────────────────────────────

            // ── L KEY EASTER EGG ──────────────────────────────────────────
            var lPressCount = 0;
            var lEasterEggTriggered = false;

            document.addEventListener('keydown', function(e) {
                if (e.key === 'l' || e.key === 'L') {
                    if (lEasterEggTriggered) return;
                    lPressCount++;
                    if (lPressCount >= 15) {
                        lEasterEggTriggered = true;
                        triggerBeeptEasterEgg();
                    }
                }
            });

            function triggerBeeptEasterEgg() {
                // Mute every audio element on the page
                var allAudio = document.querySelectorAll('audio');
                allAudio.forEach(function(a) {
                    a.pause();
                    a.volume = 0;
                });
                // Play beept at full volume
                var beept = document.getElementById('beept');
                beept.volume = 1;
                beept.play().catch(() => {});
            }
            // ── END L KEY EASTER EGG ──────────────────────────────────────

            // ── MOBILE TAP EASTER EGGS ─────────────────────────────────────
            // Tap timer 10x = Chica easter egg (mirrors M key)
            var mobileMTapCount = 0;
            function mobileMTap() {
                if (mEasterEggTriggered) return;
                mobileMTapCount++;
                mPressCount = mobileMTapCount; // keep in sync with keyboard counter
                if (mobileMTapCount >= 10) {
                    mEasterEggTriggered = true;
                    triggerChicaEasterEgg();
                }
            }
            // Tap power text 15x = beept easter egg (mirrors L key)
            var mobileLTapCount = 0;
            function mobileLTap() {
                if (lEasterEggTriggered) return;
                mobileLTapCount++;
                lPressCount = mobileLTapCount; // keep in sync with keyboard counter
                if (mobileLTapCount >= 15) {
                    lEasterEggTriggered = true;
                    triggerBeeptEasterEgg();
                }
            }
            // ── END MOBILE TAP EASTER EGGS ────────────────────────────────

            // Prevent default touch behaviour globally (no scroll, no zoom, no context menu)
            document.addEventListener('touchmove', function(e){ e.preventDefault(); }, { passive: false });
            document.addEventListener('touchstart', function(e){
                // Allow audio unlock on first touch (iOS requires user gesture)
                var audios = document.querySelectorAll('audio');
                audios.forEach(function(a){ a.load(); });
            }, { once: true });

            // left
            function left(){
                // leftDoor
                leftDoor++;
                if (leftDoor == true){
                    // buttom
                    document.getElementById('leftButtom').src = 'nightshift/leftOn.png';
                    // door
                    document.getElementById('leftDoor').src = 'nightshift/doorClose.png';
                    // usage
                    usageCounter = usageCounter + 1;
                    usage();
                } else {
                    // buttom
                    document.getElementById('leftButtom').src = 'nightshift/leftOff.png';
                    // door
                    document.getElementById('leftDoor').src = 'nightshift/doorOpen.png';
                    // leftDoor
                    leftDoor = false;
                    // usage
                    usageCounter = usageCounter - 1;
                    usage();
                }
                // door
                document.getElementById('door').play();
            }
            // right
            function right(){
                // rightDoor
                rightDoor++;
                if (rightDoor == true){
                    // buttom
                    document.getElementById('rightButtom').src = 'nightshift/rightOn.png';
                    // door
                    document.getElementById('rightDoor').src = 'nightshift/doorClose.png';
                    // usage
                    usageCounter = usageCounter + 1;
                    usage();
                } else {
                    // buttom
                    document.getElementById('rightButtom').src = 'nightshift/rightOff.png';
                    // door
                    document.getElementById('rightDoor').src = 'nightshift/doorOpen.png';
                    // rightDoor
                    rightDoor = false;
                    // usage
                    usageCounter = usageCounter - 1;
                    usage();
                }
                // door
                document.getElementById('door').play();
            }
            // monitor
            function monitor(){
                // tablet
                tablet++;
                if (tablet == true){
                    // camera
                    document.getElementById('camera').style.visibility = 'visible';
                    // static
                    document.getElementById('static').style.visibility = 'visible';
                    // left
                    document.getElementById('leftButtom').style.visibility = 'hidden';
                    document.getElementById('leftDoor').style.visibility = 'visible';
                    // right
                    document.getElementById('rightButtom').style.visibility = 'hidden';
                    document.getElementById('rightDoor').style.visibility = 'visible';
                    // map
                    document.getElementById('map').style.visibility = 'visible';
                    // camera
                    document.getElementById('showStage').style.visibility = 'visible';
                    document.getElementById('diningArea').style.visibility = 'visible';
                    document.getElementById('backstage').style.visibility = 'visible';
                    document.getElementById('pirateCove').style.visibility = 'visible';
                    document.getElementById('restrooms').style.visibility = 'visible';
                    document.getElementById('kitchen').style.visibility = 'visible';
                    document.getElementById('westHall').style.visibility = 'visible';
                    document.getElementById('supplyCloset').style.visibility = 'visible';
                    document.getElementById('westCorner').style.visibility = 'visible';
                    document.getElementById('eastHall').style.visibility = 'visible';
                    document.getElementById('eastCorner').style.visibility = 'visible';
                    // audios
                    document.getElementById('ambienceCamera').play();
                    document.getElementById('laugh1').volume = 1;
                    document.getElementById('laugh2').volume = 1;
                    document.getElementById('laugh3').volume = 1;
                    document.getElementById('kitchen1').volume = 1;
                    document.getElementById('kitchen2').volume = 1;
                    document.getElementById('run').volume = 1;
                    document.getElementById('door').volume = 0.5;
                    document.getElementById('tabletOn').play();
                    document.getElementById('walk1').volume = 1;
                    document.getElementById('walk2').volume = 1;
                    document.getElementById('walk3').volume = 1;
                    document.getElementById('walk4').volume = 1;
                    document.getElementById('walk5').volume = 1;
                    // usage
                    usageCounter = usageCounter + 1;
                    usage();
                } else {
                    // camera
                    document.getElementById('camera').style.visibility = 'hidden';
                    // static
                    document.getElementById('static').style.visibility = 'hidden';
                    // left
                    document.getElementById('leftButtom').style.visibility = 'visible';
                    document.getElementById('leftDoor').style.visibility = 'hidden';
                    // right
                    document.getElementById('rightButtom').style.visibility = 'visible';
                    document.getElementById('rightDoor').style.visibility = 'hidden';
                    // map
                    document.getElementById('map').style.visibility = 'hidden';
                    // camera
                    document.getElementById('showStage').style.visibility = 'hidden';
                    document.getElementById('diningArea').style.visibility = 'hidden';
                    document.getElementById('backstage').style.visibility = 'hidden';
                    document.getElementById('pirateCove').style.visibility = 'hidden';
                    document.getElementById('restrooms').style.visibility = 'hidden';
                    document.getElementById('kitchen').style.visibility = 'hidden';
                    document.getElementById('westHall').style.visibility = 'hidden';
                    document.getElementById('supplyCloset').style.visibility = 'hidden';
                    document.getElementById('westCorner').style.visibility = 'hidden';
                    document.getElementById('eastHall').style.visibility = 'hidden';
                    document.getElementById('eastCorner').style.visibility = 'hidden';
                    // audio
                    document.getElementById('ambienceCamera').pause();
                    document.getElementById('laugh1').volume = 0.5;
                    document.getElementById('laugh2').volume = 0.5;
                    document.getElementById('laugh3').volume = 0.5;
                    document.getElementById('kitchen1').volume = 0.5;
                    document.getElementById('kitchen2').volume = 0.5;
                    document.getElementById('run').volume = 0.5;
                    document.getElementById('door').volume = 1;
                    document.getElementById('tabletOff').play();
                    document.getElementById('walk1').volume = 0.5;
                    document.getElementById('walk2').volume = 0.5;
                    document.getElementById('walk3').volume = 0.5;
                    document.getElementById('walk4').volume = 0.5;
                    document.getElementById('walk5').volume = 0.5;
                    // tablet
                    tablet = false;
                    // usage
                    usageCounter = usageCounter - 1;
                    usage();
                }
            }
            // camera
            function camera(camCounter){
                // camCounter
                if (camCounter == 0){
                    // camera
                    document.getElementById('camera').src = 'nightshift/showStage.png';
                    // blip
                    document.getElementById('blip').play();
                } else if (camCounter == 1){
                    // camera
                    document.getElementById('camera').src = 'nightshift/diningArea.png';
                    // blip
                    document.getElementById('blip').play();
                } else if (camCounter == 2){
                    // camera
                    document.getElementById('camera').src = 'nightshift/backstage.png';
                    // blip
                    document.getElementById('blip').play();
                } else if (camCounter == 3){
                    // camera
                    document.getElementById('camera').src = 'nightshift/pirateCove.png';
                    // blip
                    document.getElementById('blip').play();
                } else if (camCounter == 4){
                    // camera
                    document.getElementById('camera').src = 'nightshift/restrooms.png';
                    // blip
                    document.getElementById('blip').play();
                } else if (camCounter == 5){
                    // camera
                    document.getElementById('camera').src = 'nightshift/kitchen.png';
                    // blip
                    document.getElementById('blip').play();
                } else if (camCounter == 6){
                    // camera
                    document.getElementById('camera').src = 'nightshift/westHall.png';
                    // blip
                    document.getElementById('blip').play();
                } else if (camCounter == 7){
                    // camera
                    document.getElementById('camera').src = 'nightshift/supplyCloset.png';
                    // blip
                    document.getElementById('blip').play();
                } else if (camCounter == 8){
                    // camera
                    document.getElementById('camera').src = 'nightshift/westCorner.png';
                    // blip
                    document.getElementById('blip').play();
                } else if (camCounter == 9){
                    // camera
                    document.getElementById('camera').src = 'nightshift/eastHall.png';
                    // blip
                    document.getElementById('blip').play();
                } else if (camCounter == 10){
                    // camera
                    document.getElementById('camera').src = 'nightshift/eastCorner.png';
                    // door
                    document.getElementById('blip').play();
                }
                // bonnie
                if (camCounter == 0 && bunny >= 1){
                    document.getElementById('camera').src = 'nightshift/bonnie/showStage.png';
                } else if (camCounter == 1 && bunny == 1){
                    document.getElementById('camera').src = 'nightshift/bonnie/diningArea.png';
                } else if (camCounter == 2 && bunny == 2){
                    document.getElementById('camera').src = 'nightshift/bonnie/backstage.png';
                } else if (camCounter == 6 && bunny == 3){
                    document.getElementById('camera').src = 'nightshift/bonnie/westHall.png';
                } else if (camCounter == 7 && bunny == 4){
                    document.getElementById('camera').src = 'nightshift/bonnie/supplyCloset.png';
                } else if (camCounter == 8 && bunny == 5){
                    document.getElementById('camera').src = 'nightshift/bonnie/westCorner.png';
                }
                // chica
                if ((camCounter == 0 && bunny >= 1) && (camCounter == 0 && chicken >= 1)){
                    document.getElementById('camera').src = 'nightshift/chica/showStageA.png';
                } else if ((camCounter == 0 && bunny <= 0) && (camCounter == 0 && chicken >= 1)){
                    document.getElementById('camera').src = 'nightshift/chica/showStageB.png';
                } else if (camCounter == 1 && chicken == 1){
