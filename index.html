
<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8'>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;height:100%;
  background:#000;
  font-family:'Share Tech Mono','Courier New',monospace;
  overflow:hidden;
}

body{
  display:flex;align-items:center;justify-content:center;
  min-height:500px;
}

#scene{
  width:700px;
  height:500px;
  position:relative;
  flex-shrink:0;
  transform-origin:center center;
}

#bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 55%, #200000 0%, #000 75%);
}

#scanlines{
  position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.25) 3px,rgba(0,0,0,0.25) 4px);
  pointer-events:none;z-index:50;
}

#staticOverlay{
  position:absolute;inset:0;
  opacity:0.07;pointer-events:none;z-index:49;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}

#vignette{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%, transparent 25%, rgba(0,0,0,0.9) 100%);
  pointer-events:none;z-index:48;
}

#glitch-bar{
  position:absolute;height:2px;
  background:rgba(200,0,0,0.55);
  left:0;width:100%;z-index:200;
  pointer-events:none;opacity:0;
}

#eyeCanvas{
  position:absolute;top:0;left:0;width:100%;height:100%;
  z-index:5;pointer-events:none;
}

#content{
  position:absolute;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;
  padding:2rem;
}

/* LOGO */
.logo-block{
  text-align:center;margin-bottom:2.8rem;
  animation:logoFlicker 7s infinite;
}

.logo-eyebrow{
  color:#5a0000;font-size:11px;letter-spacing:0.45em;text-transform:uppercase;margin-bottom:0.5rem;
}

.logo-title{
  color:#dd0000;
  font-size:2.6rem;
  letter-spacing:0.08em;
  text-shadow:0 0 18px rgba(220,0,0,0.7), 0 0 50px rgba(150,0,0,0.4);
  line-height:1.15;
}

.logo-sub{
  color:#3d0000;font-size:11px;letter-spacing:0.3em;margin-top:0.5rem;text-transform:uppercase;
}

@keyframes logoFlicker{
  0%,92%,96%,100%{opacity:1;}
  93%,95%{opacity:0.15;}
}

.select-label{
  color:#4a0000;font-size:10px;letter-spacing:0.55em;text-transform:uppercase;margin-bottom:1.5rem;
}

/* CARDS */
.cards-row{
  display:flex;gap:2.5rem;justify-content:center;
}

.game-card{
  width:210px;
  border:1px solid #260000;
  background:#060000;
  padding:2rem 1.5rem 1.5rem;
  display:flex;flex-direction:column;align-items:center;gap:0.8rem;
  position:relative;overflow:hidden;
  transition:border-color 0.15s,transform 0.12s;
  text-decoration:none;
}

.game-card.active{cursor:pointer;}

.game-card.active:hover{
  border-color:#cc0000;
  transform:translateY(-5px);
}

.game-card.active:hover .cnum{
  color:#ff1a1a;
  text-shadow:0 0 25px rgba(255,0,0,0.8);
}
.game-card.active:hover .cname{color:#dd0000;}
.game-card.active:hover .ctag{color:#880000;}
.game-card.active:hover .corner{border-color:#cc0000;}

.game-card.locked{
  cursor:not-allowed;opacity:0.28;border-color:#0e0000;
}

.corner{
  position:absolute;width:10px;height:10px;
  border-color:#330000;border-style:solid;
  transition:border-color 0.15s;
}
.corner.tl{top:6px;left:6px;border-width:1px 0 0 1px;}
.corner.tr{top:6px;right:6px;border-width:1px 1px 0 0;}
.corner.bl{bottom:6px;left:6px;border-width:0 0 1px 1px;}
.corner.br{bottom:6px;right:6px;border-width:0 1px 1px 0;}

.cnum{
  font-size:3.6rem;color:#aa0000;
  line-height:1;font-family:'Share Tech Mono',monospace;
  text-shadow:0 0 18px rgba(170,0,0,0.6);
  transition:color 0.15s,text-shadow 0.15s;
}

.cdivider{width:40px;height:1px;background:#220000;}

.cname{
  font-size:12px;color:#770000;
  letter-spacing:0.12em;text-align:center;
  transition:color 0.15s;line-height:1.6;
}

.ctag{
  font-size:10px;color:#3d0000;letter-spacing:0.3em;text-transform:uppercase;
  margin-top:0.3rem;transition:color 0.15s;
}

.coming-badge{
  position:absolute;top:8px;right:8px;
  background:#0a0000;border:1px solid #1a0000;
  font-size:8px;color:#330000;letter-spacing:0.18em;text-transform:uppercase;
  padding:4px 7px;
}

/* FOOTER */
.footer-row{
  margin-top:2.5rem;
  display:flex;align-items:center;gap:14px;
  color:#250000;font-size:9px;letter-spacing:0.45em;text-transform:uppercase;
}
.footer-row span{color:#2d0000;}
</style>
</head>
<body>

<div id="scene">
  <div id="bg"></div>
  <div id="staticOverlay"></div>
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="glitch-bar"></div>
  <canvas id="eyeCanvas"></canvas>

  <div id="content">
    <div class="logo-block">
      <p class="logo-eyebrow">Versatile Studios Presents...</p>
      <p class="logo-title">FIVE NIGHTS<br>AT SHAWN'S</p>
      <p class="logo-sub"></p>
    </div>

    <p class="select-label">&#9632; Choose Your Version &#9632;</p>

    <div class="cards-row">
      <a class="game-card active" href="Versions/FNAS 1" id="card1">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="cnum">1</div>
        <div class="cdivider"></div>
        <div class="cname">Five Nights<br>at Shawn's</div>
        <div class="ctag">&#9654;&nbsp; Play Now</div>
      </a>

      <div class="game-card locked" id="card2">
        <div class="coming-badge">Coming Soon</div>
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="cnum" style="color:#180000;text-shadow:none;">2</div>
        <div class="cdivider"></div>
        <div class="cname" style="color:#1e0000;">Five Nights<br>at Shawn's 2</div>
        <div class="ctag" style="color:#180000;">&#9632;&nbsp; Locked</div>
      </div>
    </div>

    <div class="footer-row">
      <span>&#9632;</span><span>Night Guard On Duty</span><span>&#9632;</span>
    </div>
  </div>
</div>

<script>
// SCALE TO FIT
function scaleScene(){
  let scene = document.getElementById('scene');
  let scaleX = window.innerWidth / 700;
  let scaleY = window.innerHeight / 500;
  let scale = Math.min(scaleX, scaleY);
  scene.style.transform = 'scale('+scale+')';
}
scaleScene();
window.addEventListener('resize', scaleScene);

// GLITCH BAR
function runGlitchBar(){
  let bar = document.getElementById('glitch-bar');
  bar.style.top=(Math.random()*490)+'px';
  bar.style.opacity='1';
  bar.style.width=(35+Math.random()*55)+'%';
  bar.style.left=(Math.random()*40)+'%';
  setTimeout(()=>{bar.style.opacity='0';},55);
  setTimeout(runGlitchBar, 800+Math.random()*3000);
}
runGlitchBar();

// STATIC FLICKER
let staticEl=document.getElementById('staticOverlay');
setInterval(()=>{
  let r=Math.random();
  staticEl.style.opacity=r>0.93?'0.28':r>0.7?'0.09':'0.04';
},120);

// SCREEN FLASH
let bgEl=document.getElementById('bg');
setInterval(()=>{
  if(Math.random()>0.97){
    bgEl.style.background='radial-gradient(ellipse at 50% 55%, #300000 0%, #000 75%)';
    setTimeout(()=>{bgEl.style.background='radial-gradient(ellipse at 50% 55%, #200000 0%, #000 75%)';},65);
  }
},220);

// RED EYES
let canvas=document.getElementById('eyeCanvas');
let ctx=canvas.getContext('2d');
function resizeCanvas(){canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

let eyes=[];
for(let i=0;i<8;i++){
  eyes.push({
    x:Math.random()*100,y:Math.random()*100,
    size:5+Math.random()*12,
    alpha:0,alphaTarget:0,
    phase:Math.random()*Math.PI*2,
    speed:0.003+Math.random()*0.004,
    blink:1,blinkT:Math.random()*10
  });
}

function drawEye(x,y,size,alpha,blink){
  if(alpha<=0.01)return;
  ctx.save();
  ctx.globalAlpha=alpha*0.5;
  let sx=x/100*canvas.width, sy=y/100*canvas.height;
  ctx.strokeStyle='#cc0000';ctx.lineWidth=0.9;
  ctx.beginPath();ctx.ellipse(sx,sy,size*2.2,size*blink,0,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(sx,sy,size*0.7,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#990000';
  ctx.beginPath();ctx.arc(sx,sy,size*0.28,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function animEyes(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  eyes.forEach(e=>{
    e.phase+=e.speed;
    e.alphaTarget=(Math.sin(e.phase)>0.5)?0.4+Math.random()*0.35:0;
    e.alpha+=(e.alphaTarget-e.alpha)*0.04;
    e.blinkT+=0.04;
    e.blink=Math.abs(Math.sin(e.blinkT*3))*0.8+0.2;
    drawEye(e.x,e.y,e.size,e.alpha,e.blink);
  });
  requestAnimationFrame(animEyes);
}
animEyes();

document.getElementById('card1').addEventListener('mouseenter',()=>{
  if(Math.random()>0.4){
    document.getElementById('scene').style.filter='brightness(1.3) saturate(2)';
    setTimeout(()=>document.getElementById('scene').style.filter='none',70);
  }
});

document.addEventListener('contextmenu',e=>e.preventDefault());
</script>
</body>
</html>
